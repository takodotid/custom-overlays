<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

        * {
            font-family: "Poppins", sans-serif;
        }

        #profile-picture[src=""] {
            display: none;
        }

        #verified-badge-false {
            display: none;
        }
    </style>
</head>

<body class="py-14 pt-16 pl-14 overflow-hidden">
    <section class="relative w-full flex items-center">
        <!-- Top decorative bubbles -->
        <div class="absolute inset-0 z-20 pointer-events-none">
            <img class="absolute size-[106px] -top-[65px] right-[120px]"
                src="https://lh3.googleusercontent.com/d/1IEWN6gmjDu8DwquV-hmguh8T-_Qk7d1x" alt="" />
            <img class="absolute size-[58px] -top-[26px] right-[230px]"
                src="https://lh3.googleusercontent.com/d/1IEWN6gmjDu8DwquV-hmguh8T-_Qk7d1x" alt="" />
            <img class="absolute size-[53px] -top-[33px] left-[200px]"
                src="https://lh3.googleusercontent.com/d/1IEWN6gmjDu8DwquV-hmguh8T-_Qk7d1x" alt="" />
        </div>

        <!-- Main pill -->
        <main class="relative z-30 flex-1 ml-10 mr-6 min-h-[200px] flex flex-col gap-[10px] items-start justify-center pl-[218px] pr-[40px] py-[30px] rounded-[48px] overflow-hidden"
            style="background-image: linear-gradient(-69.6deg, rgb(237, 235, 236) 57.106%, rgb(245, 176, 196) 100%); box-shadow: 12px 12px 0 0 #f5b0c4, inset 0 0 0 4px #ffffff;">
            <!-- Cloud background on the right -->
            <div class="absolute -top-[78px] bottom-0 left-[383px] right-0 min-w-[416px] bg-no-repeat bg-right bg-cover pointer-events-none z-0"
                style="background-image: url('https://lh3.googleusercontent.com/d/1Is0fXZ01n1UyPgXBN07Wys-0bFsirfKc');"></div>

            <div class="relative z-10 w-full flex flex-col gap-[10px]">
                <section id="header"
                    class="flex items-center gap-2 text-[24px] tracking-[-0.48px] text-[#861b37] flex-wrap">
                    <span class="font-extrabold shrink-0">{{formattedAmount}}</span>
                    <span class="font-bold">dari</span>
                    <img id="profile-picture" src="{{gifterPicture}}"
                        class="size-6 rounded-full border border-white shrink-0 object-cover" alt="" />
                    <span class="font-bold truncate">{{gifterName}}</span>
                    <img id="verified-badge-{{isGifterVerified}}"
                        src="https://assets.tako.id/badges/validated-user.png" alt="" class="size-6 shrink-0" />
                    <div class="flex items-center shrink-0 gap-2 empty:hidden" id="badges"></div>
                </section>

                <p id="content"
                    class="leading-normal text-[#861b37] text-[18px] tracking-[-0.36px] empty:before:content-['Tidak_Ada_Pesan']">
                   {{message}}</p>
            </div>
        </main>

        <!-- Big character/profile circle on the left, anchored to bottom (visually centered at min height, sticks to bottom when box grows) -->
        <div class="absolute z-40 left-0 -bottom-[28px] size-[255px]">
            <!-- Character image (below the glass bubble) -->
            <img class="absolute inset-0 size-[255px] rounded-full object-cover"
                src="https://lh3.googleusercontent.com/d/1Nu7C-cFR3N1T2wAwr3_9IlcnFYT5C-Za" alt="" />
            <!-- Glass bubble overlay on top of the character -->
            <img class="absolute size-[277px] -left-[2px] -top-[12px] opacity-30 pointer-events-none"
                src="https://lh3.googleusercontent.com/d/1IEWN6gmjDu8DwquV-hmguh8T-_Qk7d1x" alt="" />
            <!-- Side bubble decorations -->
            <img class="absolute size-[68px] -left-[34px] top-0 opacity-80 pointer-events-none"
                src="https://lh3.googleusercontent.com/d/1IEWN6gmjDu8DwquV-hmguh8T-_Qk7d1x" alt="" />
            <img class="absolute size-[78px] -left-[60px] top-[150px] opacity-80 pointer-events-none"
                src="https://lh3.googleusercontent.com/d/1IEWN6gmjDu8DwquV-hmguh8T-_Qk7d1x" alt="" />
            <img class="absolute size-[40px] -left-[10px] -bottom-[10px] opacity-80 pointer-events-none"
                src="https://lh3.googleusercontent.com/d/1IEWN6gmjDu8DwquV-hmguh8T-_Qk7d1x" alt="" />
        </div>
    </section>

    <script>
        const badges = "{{gifterBadges}}";
        const badgeContainer = document.getElementById("badges");

        if (badges && badgeContainer) {
            badgeContainer.innerHTML += badges
                .split(",")
                .map((b) => `<img src="https://assets.tako.id/badges/${b.trim()}.png" alt="" class="size-7 shrink-0" />`)
                .join(" ");
        }

        const content = document.getElementById("content").textContent.replace(/\[([a-zA-Z0-9_]+)\]/g, (match, name) => {
            const url = `https://assets.tako.id/stickers/${name}.png`;
            return `<img src="${url}" class="align-middle h-9 inline-block"></img>`;
        });

        document.getElementById("content").innerHTML = content;
        document.documentElement.style.fontSize = "16px";
    </script>
</body>
